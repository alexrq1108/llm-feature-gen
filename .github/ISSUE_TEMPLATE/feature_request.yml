name: Feature request
description: Suggest an improvement or new capability for llm-feature-gen
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: I'm unable to...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would this help in practice?
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried?
    validations:
      required: false
