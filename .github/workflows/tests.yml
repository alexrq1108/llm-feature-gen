name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep full interpreter coverage on Linux while smoke-testing
          # the supported non-Linux runners for platform breadth.
          - os: ubuntu-latest
            python-version: "3.9"
            upload-coverage: false
          - os: ubuntu-latest
            python-version: "3.11"
            upload-coverage: true
          - os: ubuntu-latest
            python-version: "3.13"
            upload-coverage: false
          - os: macos-latest
            python-version: "3.11"
            upload-coverage: false
          - os: windows-latest
            python-version: "3.11"
            upload-coverage: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade setuptools wheel

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify package import
        run: python -c "import llm_feature_gen; print(llm_feature_gen.__file__)"

      - name: Run tests
        run: python -m pytest

      - name: Upload coverage to Codecov
        if: matrix.upload-coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
